# 星屿 Kubernetes部署配置
apiVersion: v1
kind: Namespace
metadata:
  name: starisle

---
# PostgreSQL部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: starisle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:14-alpine
        env:
        - name: POSTGRES_DB
          value: "starisle"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: starisle-secrets
              key: db-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: starisle-secrets
              key: db-password
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: starisle
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---
# MongoDB部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: starisle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: starisle-secrets
              key: mongo-user
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: starisle-secrets
              key: mongo-password
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: starisle
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017

---
# Redis部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: starisle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7.0-alpine
        command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: starisle-secrets
              key: redis-password
        ports:
        - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: starisle
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# API Gateway部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: starisle
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: starisle/api-gateway:v1.0
        ports:
        - containerPort: 8080
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: starisle-secrets
              key: database-url
        - name: MONGODB_URL
          valueFrom:
            secretKeyRef:
              name: starisle-secrets
              key: mongodb-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: starisle-secrets
              key: redis-url
        - name: AI_SERVICE_URL
          value: "http://ai-engine-service:8000"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: starisle
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8080
    targetPort: 8080
  type: LoadBalancer

---
# AI引擎部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: starisle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
      - name: ai-engine
        image: starisle/ai-engine:v1.0
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_API_KEY
          valueFrom:
            secretKeyRef:
              name: starisle-secrets
              key: model-api-key
        - name: MODEL_API_BASE
          valueFrom:
            secretKeyRef:
              name: starisle-secrets
              key: model-api-base

---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine-service
  namespace: starisle
spec:
  selector:
    app: ai-engine
  ports:
  - port: 8000
    targetPort: 8000

---
# Persistent Volume Claims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: starisle
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: starisle
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

