version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:14-alpine
    container_name: starisle-postgres
    environment:
      POSTGRES_DB: starisle
      POSTGRES_USER: starisle_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starisle_user -d starisle"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB数据库
  mongodb:
    image: mongo:6.0
    container_name: starisle-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: starisle_admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7.0-alpine
    container_name: starisle-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka消息队列
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: starisle-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: starisle-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # API Gateway
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starisle-api
    depends_on:
      - postgres
      - mongodb
      - redis
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://starisle_user:${DB_PASSWORD}@postgres:5432/starisle
      MONGODB_URL: mongodb://starisle_admin:${MONGO_PASSWORD}@mongodb:27017/starisle
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKER: kafka:9092
      AI_SERVICE_URL: http://ai-engine:8000

  # AI对话引擎
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: starisle-ai
    depends_on:
      - redis
      - mongodb
    ports:
      - "8000:8000"
    environment:
      MODEL_API_KEY: ${MODEL_API_KEY}
      MODEL_API_BASE: ${MODEL_API_BASE}
      REDIS_URL: redis://redis:6379
      MONGODB_URL: mongodb://starisle_admin:${MONGO_PASSWORD}@mongodb:27017/starisle

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  zookeeper_data: